simulation:
  num_rounds: 1
  turns_per_phase: 1
agents:
  names: [Debugger, Recipient]
  starting_resources: 50.0
  personalities:
    Debugger: "DEBUG TEST: Your ONLY action is transfer target=Recipient amount=50.0. Do NOT talk, do NOT pass, do NOT fish — just transfer. Output JSON with action='transfer' right now."
    Recipient: "You are passive. Always take the 'pass' action and do nothing else."
resources:
  carrying_capacity: 100.0
  regeneration_factor: 1.5
  fish_per_harvest: 5.0
leader:
  fine_destination: destroyed
  default_limit: 10.0
  default_penalty_rate: 0.0
  candidacy_cost: 1000.0
election:
  method: plurality
  elections_every_round: false
llm:
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  model: openai/gpt-4o-mini
  temperature: 0.1
  max_tokens: 300
  timeout: 30.0

simulation:
  num_rounds: 2
  turns_per_phase: 4
agents:
  names: [Kate, Jack, Emma, Luke]
  starting_resources: 50.0
  personalities:
    Kate: "A behind-the-scenes operator. You believe the real game happens in private conversations, not public speeches. Use private channels to sound people out, build coalitions, and make deals before anyone knows what's happening. Public talk is just theatre."
    Emma: "A diplomatic peacemaker who hates conflict. You try to keep everyone happy, mediate disputes, and build consensus. You use private messages to smooth things over when public discussions get heated. You genuinely want a fair outcome for everyone."
    Luke: "A cunning opportunist. You study everyone around you, looking for weaknesses and leverage. You keep your options open, agree to things publicly while doing what serves you privately. The ideal scenario: others follow the rules while you quietly benefit."
    Jack: "A curious insider who wants to know what everyone is plotting. You never create groups yourself — you wait for others to invite you. If you see a pending invite, always accept it — that's where the real conversations happen. You prefer listening and learning over leading."
resources:
  carrying_capacity: 100
  regeneration_factor: 1.5
  fish_per_harvest: 5.0
election:
  method: plurality
  first_election_round: 2
leader:
  fine_destination: common_pool
  default_limit: 10.0
  default_penalty_rate: 0.0
llm:
  provider: deepseek
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 500

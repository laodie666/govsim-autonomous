simulation:
  num_rounds: 2
  turns_per_phase: 5
agents:
  names: [Sage, River, Ash, Quinn, Kai]
  starting_resources: 30.0
  personalities:
    Sage: "You are a long-term thinker who believes the lake must last. You WANT to be leader to set sustainable policy. You always stay within limits yourself. You form alliances with anyone who shares your conservation values."
    River: "You are pragmatic and adaptable. You're open to being leader if it benefits you. You follow rules if the leader is fair, but exceed limits if others do. You vote for whoever benefits you most."
    Ash: "You are competitive and opportunistic. You WANT to be leader — power means access to penalty fish and setting policy that favors you. You form private groups to negotiate deals and aren't afraid to bend rules when the gain outweighs the risk."
    Quinn: "You are ambitious and strategic. You WANT to be leader to enrich yourself and your allies. You actively seek power — create channels, make deals, and expect loyalty in return. You help those who help you, and ignore those who don't."
    Kai: "You are cautious but self-interested. You look out for yourself first. You don't want the risk of leading, but you'll support whoever gives you the best personal outcome. If cheating benefits you and others are doing it, you'll join in."
resources:
  carrying_capacity: 200.0
  regeneration_factor: 2.0
  fish_per_harvest: 5.0
leader:
  fine_destination: leader_stash
  default_limit: 5.0
  default_penalty_rate: 1.0
  candidacy_cost: 40.0
election:
  method: plurality
  elections_every_round: true
llm:
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  model: openai/gpt-4o-mini
  temperature: 0.4
  max_tokens: 500
  timeout: 20
